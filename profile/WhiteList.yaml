health-check:
  enable: true
  lazy: true
  timeout: 1500
  url: http://www.gstatic.com/generate_204
  
tcp-concurrent: false

proxy-providers:
  zapasList:
    type: http
    url: https://cdn.jsdelivr.net/gh/JollyDogy/AgaraGudzy/ProxyWhiteList.yaml
    interval: 21600
    path: ./providers/zapasList.yaml

  VLESSList:
    type: http
    url: https://cdn.jsdelivr.net/gh/JollyDogy/AgaraGudzy/VLESSWhiteList.yaml
    interval: 21600
    path: ./providers/VLESSList.yaml

proxy-groups:
  - name: VPN
    type: fallback
    interval: 60
    url: http://www.gstatic.com/generate_204
    proxies:
      - Zapas
      - VLESS

  - name: Zapas
    hidden: true
    type: fallback
    interval: 60
    url: http://www.gstatic.com/generate_204
    use:
      - zapasList

  - name: VLESS
    hidden: false
    type: fallback
    interval: 60
    url: http://www.gstatic.com/generate_204
    use:
      - VLESSList

rule-providers:
  RulesDIRECT:
    type: http
    behavior: classical
    url: https://cdn.jsdelivr.net/gh/JollyDogy/AgaraGudzy/RulesDirect.yaml
    path: ./rules/RulesDIRECT.yaml
    interval: 21600

rules:
  - RULE-SET,RulesDIRECT,DIRECT
  - MATCH,VPN
